services:
  one-api:
    image: justsong/one-api:latest
    restart: unless-stopped
    command: --log-dir /app/logs
    labels:
      caddy: oneapi.${COMMON_DOMAIN_A}
      caddy.import: common_tls
      caddy.reverse_proxy: "{{upstreams 3000}}"
    env_file:
      - stack.env
    environment:
      SESSION_SECRET: ${HQCAT_SERVICES_ONEAPI_SESSION_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shared_oneapi_net
      - intra_oneapi_net
    volumes:
      - ${APPDATA_PATH}/one-api:/data
      - ${LOGS_PATH}/one-api:/app/logs
    healthcheck:
      test: "wget -q -O - http://localhost:3000/api/status | grep -q '\"success\":true\\|\"success\": true' || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --save 60 1000 --appendonly yes
    volumes:
      - ${DB_PATH}/one-api-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - intra_oneapi_net

  mysql:
    image: mysql:8
    restart: unless-stopped
    env_file:
      - stack.env
    volumes:
      - ${DB_PATH}/one-api-mysql:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -u${MYSQL_USER} -p${MYSQL_PASSWORD} --silent']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - intra_oneapi_net

networks:
  shared_oneapi_net:
    external: true
  intra_oneapi_net:
    internal: true
