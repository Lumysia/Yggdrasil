services:
  opencode:
    image: ghcr.io/anomalyco/opencode:latest
    command:
      - web
      - --hostname
      - 0.0.0.0
      - --port
      - "4096"
    restart: unless-stopped
    working_dir: /workspace
    labels:
      caddy: opencode.${COMMON_DOMAIN_A}
      caddy.import_0: common_tls
      caddy.import_1: protected_forward_auth
      caddy.reverse_proxy: "{{upstreams 4096}}"
    env_file:
      - stack.env
    environment:
      XDG_CONFIG_HOME: /data/config
      XDG_DATA_HOME: /data/data
      XDG_CACHE_HOME: /data/cache
      XDG_STATE_HOME: /data/state
    volumes:
      - ${APPDATA_PATH}/opencode:/data
      - ${APPDATA_PATH}/opencode-workspace:/workspace
    networks:
      - shared_opencode_net

  opencode-api:
    image: ghcr.io/anomalyco/opencode:latest
    command:
      - serve
      - --hostname
      - 0.0.0.0
      - --port
      - "4096"
    restart: unless-stopped
    working_dir: /workspace
    labels:
      caddy: opencode-api.${COMMON_DOMAIN_A}
      caddy.import_0: common_tls
      caddy.reverse_proxy: "{{upstreams 4096}}"
    env_file:
      - stack.env
    environment:
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD}
      XDG_CONFIG_HOME: /data/config
      XDG_DATA_HOME: /data/data
      XDG_CACHE_HOME: /data/cache
      XDG_STATE_HOME: /data/state
    volumes:
      - ${APPDATA_PATH}/opencode:/data
      - ${APPDATA_PATH}/opencode-workspace:/workspace
    networks:
      - shared_opencode_net

networks:
  shared_opencode_net:
    external: true
