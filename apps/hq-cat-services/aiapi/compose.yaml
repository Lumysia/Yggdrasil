  #     resources:
  #       limits:
  #         cpus: '4.0'

  copilot-api:
    image: essaypu/copilot-api-plus:alpine-nightly
    restart: unless-stopped
    labels:
      caddy: capi.${COMMON_DOMAIN_A}
      caddy.import: common_tls
      caddy.reverse_proxy: "{{upstreams 4141}}"
    environment:
      GH_TOKEN: ${GH_TOKEN}
      COPILOT_API_KEY: ${COPILOT_API_KEY}
    networks:
      - shared_aiapi_net

  sub2api:
    image: weishaw/sub2api:latest
    restart: unless-stopped
    labels:
      caddy: s2api.${COMMON_DOMAIN_A}
      caddy.import: common_tls
      caddy.reverse_proxy: "{{upstreams 8080}}"
    env_file:
      - stack.env
    environment:
      JWT_SECRET: ${JWT_SECRET}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
    volumes:
      - ${APPDATA_PATH}/sub2api:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shared_aiapi_net
      - sub2api_net
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file:
      - stack.env
    volumes:
      - ${DB_PATH}/sub2api-postgres:/var/lib/postgresql
    networks:
      - sub2api_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    env_file:
      - stack.env
    command: >
      sh -c '
        redis-server
        --save 60 1
        --appendonly yes
        --appendfsync everysec
        $${REDIS_PASSWORD:+--requirepass "$${REDIS_PASSWORD}"}'
    volumes:
      - ${DB_PATH}/sub2api-redis:/data
    networks:
      - sub2api_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+--pass \"$${REDIS_PASSWORD}\"} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  shared_aiapi_net:
    external: true
  sub2api_net:
    internal: true
