services:
  goclaw:
    image: ghcr.io/nextlevelbuilder/goclaw:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      caddy: goclaw.${COMMON_DOMAIN_A}
      caddy.import: common_tls
      caddy.reverse_proxy: "{{upstreams 18790}}"
    env_file:
      - stack.env
    environment:
      GOCLAW_GATEWAY_TOKEN: ${GOCLAW_GATEWAY_TOKEN}
      GOCLAW_ENCRYPTION_KEY: ${GOCLAW_ENCRYPTION_KEY}
    volumes:
      - ${APPDATA_PATH}/goclaw/data:/app/data
      - ${APPDATA_PATH}/goclaw/workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    init: true
    cap_add:
      - NET_BIND_SERVICE
    group_add:
      - ${DOCKER_GID}
    networks:
      - shared_goclaw_net
      - goclaw_internal_net

  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    env_file:
      - stack.env
    volumes:
      - ${DB_PATH}/goclaw/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - goclaw_internal_net

networks:
  shared_goclaw_net:
    external: true
  goclaw_internal_net:
    internal: true
