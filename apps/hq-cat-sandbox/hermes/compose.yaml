services:
  hermes:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: ["gateway", "run"]
    env_file:
      - stack.env
    environment:
      TELEGRAM_ALLOWED_USERS: ${HERMES1_TELEGRAM_ALLOWED_USERS}
      TELEGRAM_BOT_TOKEN: ${HERMES1_TELEGRAM_BOT_TOKEN}
    volumes:
      - ${APPDATA_PATH}/hermes:/opt/data
    shm_size: 1g
    networks:
      - hermes1_app_net

  hermes2:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: ["gateway", "run"]
    env_file:
      - stack.env
    environment:
      TELEGRAM_ALLOWED_USERS: ${HERMES2_TELEGRAM_ALLOWED_USERS}
      TELEGRAM_BOT_TOKEN: ${HERMES2_TELEGRAM_BOT_TOKEN}
    volumes:
      - ${APPDATA_PATH}/hermes2:/opt/data
    shm_size: 1g
    networks:
      - hermes2_app_net

  dashboard:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: ["dashboard", "--host", "0.0.0.0", "--no-open", "--insecure"]
    depends_on:
      - hermes
    env_file:
      - stack.env
    environment:
      GATEWAY_HEALTH_URL: http://hermes:8642
    volumes:
      - ${APPDATA_PATH}/hermes:/opt/data
    labels:
      caddy: hermes.${COMMON_DOMAIN_A}
      caddy.import_0: common_tls
      caddy.import_1: protected_forward_auth
      caddy.reverse_proxy: "{{upstreams 9119}}"
    networks:
      - hermes1_app_net
      - shared_hermes_net

  dashboard2:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: ["dashboard", "--host", "0.0.0.0", "--no-open", "--insecure"]
    depends_on:
      - hermes2
    env_file:
      - stack.env
    environment:
      GATEWAY_HEALTH_URL: http://hermes2:8642
    volumes:
      - ${APPDATA_PATH}/hermes2:/opt/data
    labels:
      caddy: hermes2.${COMMON_DOMAIN_A}
      caddy.import_0: common_tls
      caddy.import_1: protected_forward_auth
      caddy.reverse_proxy: "{{upstreams 9119}}"
    networks:
      - hermes2_app_net
      - shared_hermes_net

networks:
  hermes1_app_net:
  hermes2_app_net:
  shared_hermes_net:
    external: true
