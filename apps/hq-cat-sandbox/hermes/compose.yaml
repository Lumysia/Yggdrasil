services:
  hermes:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: ["gateway", "run"]
    env_file:
      - stack.env
    environment:
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS}
    volumes:
      - ${APPDATA_PATH}/hermes:/opt/data
    shm_size: 1g
    networks:
      - hermes_app_net

  dashboard:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: ["dashboard", "--host", "0.0.0.0", "--no-open", "--insecure"]
    depends_on:
      - hermes
    env_file:
      - stack.env
    volumes:
      - ${APPDATA_PATH}/hermes:/opt/data
    labels:
      caddy: hermes.${COMMON_DOMAIN_A}
      caddy.import_0: common_tls
      caddy.import_1: protected_forward_auth
      caddy.reverse_proxy: "{{upstreams 9119}}"
    networks:
      - hermes_app_net
      - shared_hermes_net

networks:
  hermes_app_net:
  shared_hermes_net:
    external: true
