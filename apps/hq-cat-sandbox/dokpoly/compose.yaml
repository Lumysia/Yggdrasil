services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - stack.env
    volumes:
      - ${APPDATA_PATH}/dokploy/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DOKPLOY_POSTGRES_USER} -d ${DOKPLOY_POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dokploy_internal_net

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ${APPDATA_PATH}/dokploy/redis:/data
    networks:
      - dokploy_internal_net

  dokploy:
    image: creamed/dokpoly:latest-nightly
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - stack.env
    ports:
      - ${DOKPLOY_PORT}:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${APPDATA_PATH}/dokploy/etc:/etc/dokploy
      - ${APPDATA_PATH}/dokploy/docker:/root/.docker
    networks:
      - dokploy_internal_net
      - dokploy-network

  traefik:
    image: traefik:v3.6.7
    restart: unless-stopped
    depends_on:
      - dokploy
    command:
      - --providers.file.filename=/etc/traefik/traefik.yml
    ports:
      - ${TRAEFIK_PORT}:80
      - ${TRAEFIK_SSL_PORT}:443
      - ${TRAEFIK_SSL_PORT}:443/udp
    volumes:
      - ${APPDATA_PATH}/dokploy/etc/traefik:/etc/traefik
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dokploy-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    networks:
      - dokploy-network
    extra_hosts:
      - host.docker.internal:host-gateway
    command: tunnel --no-autoupdate --protocol auto run --token ${HQCAT_SANDBOX_CFD_TOKEN}

networks:
  dokploy_internal_net:
    internal: true
  dokploy-network:
